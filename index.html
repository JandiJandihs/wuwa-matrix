<div class="app">

  <section class="stats"><div class="stat"><b id="stChars">0</b><span>캐릭터</span></div><div class="stat"><b id="stTeams">0</b><span>파티</span></div><div class="stat"><b id="stPlaced">0</b><span>배치</span></div></section>

  <main>

    <section class="panel" id="teams"><div class="box row"><button class="btn blue grow" id="addTeam">파티 추가</button><button class="btn red grow" id="clearTeams">편성 초기화</button></div><div id="teamList"></div></section>
    <section class="panel" id="manage"><div class="box"><h3 style="margin:0 0 10px">DB 관리</h3><div class="row" style="flex-wrap:wrap"><button class="btn blue grow" id="syncDb">최신목록 반영</button><button class="btn ghost grow" id="resetDb">DB 초기화</button></div><p class="muted">신규 반영: 청초/경연/여우의 별자리/쇄명 초상화, 방랑자 · 전도 추가. 3.6~3.7 속성·무기·역할은 공식 확정 전 정보가 포함되어 변경될 수 있음.</p></div><div class="box"><h3 style="margin:0 0 10px">백업</h3><div class="row" style="flex-wrap:wrap"><button class="btn green grow" id="exportBtn">JSON 내보내기</button><label class="btn ghost grow" style="display:flex;align-items:center;justify-content:center"><input type="file" id="importFile" accept="application/json" style="display:none">JSON 불러오기</label></div></div><div class="box"><h3 style="margin:0 0 10px">수동 추가</h3><button class="btn blue" id="openAdd" style="width:100%">캐릭터 추가/수정</button><p class="muted">사진은 URL 또는 갤러리 파일로 직접 넣을 수 있음.</p></div></section>
  </main>
</div>

const KEY='wuwa_matrix_mobile_v3';
let state={chars:structuredClone(DEFAULT_DB),teams:Array.from({length:5},()=>[null,null,null]),selected:null,editing:null};
const $=id=>document.getElementById(id);
function clone(x){return JSON.parse(JSON.stringify(x))}
function load(){try{const s=JSON.parse(localStorage.getItem(KEY)||'null');if(s&&Array.isArray(s.chars)&&Array.isArray(s.teams))state=s}catch(e){}; sync(false)}
function persist(){localStorage.setItem(KEY,JSON.stringify(state))}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__t);window.__t=setTimeout(()=>t.classList.remove('show'),1700)}
function usedCount(id){let n=0;state.teams.forEach(team=>team.forEach(x=>{if(x===id)n++}));return n}
function rem(c){return Math.max(0,(+c.vigor||1)-usedCount(c.id))}
function charById(id){return state.chars.find(c=>c.id===id)}
function elemIcon(e){return {'회절':'☀️','인멸':'🌑','기류':'🍃','용융':'🔥','응결':'❄️','전도':'⚡'}[e]||'◇'}
function weaponIcon(w){if(!w)return '◇'; if(w.includes('직검'))return '🗡️'; if(w.includes('장검')||w.includes('브로드')||w.includes('대검'))return '⚔️'; if(w.includes('권총'))return '🔫'; if(w.includes('증폭'))return '🔮'; if(w.includes('장갑')||w.includes('권갑'))return '🥊'; return '◇'}
function imgHtml(c){const src=c.portrait||c.img||'';const initial=(c.name||'?').slice(0,1);return src?`<img src="${src}" alt="${c.name}" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'initial',textContent:'${initial}'}))">`:`<span class="initial">${initial}</span>`}
function showTab(id){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===id));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('on',p.id===id));window.scrollTo({top:0,behavior:'smooth'})}
function render(){renderStats();renderChars();renderTeams();renderSelected();persist()}
function renderStats(){$('stChars').textContent=state.chars.length;$('stTeams').textContent=state.teams.length;$('stPlaced').textContent=state.teams.flat().filter(Boolean).length}
function renderSelected(){const c=charById(state.selected);$('selectedChip').textContent=c?`선택: ${c.name} ⚡${rem(c)}/${c.vigor}`:'선택 없음'}
function renderChars(){const q=$('q').value.trim().toLowerCase(), elem=$('elem').value, role=$('role').value;let list=state.chars.filter(c=>(!q||(c.name||'').toLowerCase().includes(q)||(c.en||'').toLowerCase().includes(q)||((c.alias||[]).join(' ').toLowerCase().includes(q)))&&(!elem||c.elem===elem)&&(!role||c.role===role));list.sort((a,b)=>rem(b)-rem(a)||a.elem.localeCompare(b.elem)||a.name.localeCompare(b.name));$('charGrid').innerHTML=list.map(c=>`<button class="char ${state.selected===c.id?'sel':''} ${rem(c)<=0?'used':''}" data-char="${c.id}"><div class="elemBadge" title="${c.elem}">${elemIcon(c.elem)}</div><div class="weaponBadge" title="${c.weapon||''}">${weaponIcon(c.weapon||'')}</div><div class="portrait">${imgHtml(c)}</div><div class="name">${c.name}</div>${(c.alias&&c.alias[0])?`<div class="alias">(${c.alias[0]})</div>`:``}<div class="roleBadge">${c.elem} · ${c.role}</div><div class="vigor">⚡ ${rem(c)} / ${c.vigor}</div></button>`).join('')||'<div class="hint">검색 결과 없음</div>';document.querySelectorAll('[data-char]').forEach(el=>el.onclick=()=>{const c=charById(el.dataset.char);if(rem(c)<=0){toast('피로도 없음');return}state.selected=c.id;render();toast(c.name+' 선택됨')})}
function renderTeams(){$('teamList').innerHTML=state.teams.map((team,i)=>`<div class="team"><div class="teamHead"><div class="teamTitle"><span class="num">${i+1}</span>${i+1}파티</div><div class="teamBtns"><button class="btn mini ghost" data-up="${i}">↑</button><button class="btn mini ghost" data-down="${i}">↓</button><button class="btn mini red" data-delteam="${i}">삭제</button></div></div><div class="slots">${team.map((id,j)=>slotHtml(id,i,j)).join('')}</div></div>`).join('');document.querySelectorAll('[data-slot]').forEach(el=>el.onclick=()=>place(+el.dataset.team,+el.dataset.slot));document.querySelectorAll('[data-remove]').forEach(el=>el.onclick=(e)=>{e.stopPropagation();state.teams[+el.dataset.team][+el.dataset.slot]=null;render();toast('제거됨')});document.querySelectorAll('[data-delteam]').forEach(el=>el.onclick=()=>{if(state.teams.length<=1) return toast('최소 1파티 필요');state.teams.splice(+el.dataset.delteam,1);render()});document.querySelectorAll('[data-up]').forEach(el=>el.onclick=()=>moveTeam(+el.dataset.up,-1));document.querySelectorAll('[data-down]').forEach(el=>el.onclick=()=>moveTeam(+el.dataset.down,1))}
function slotHtml(id,i,j){if(!id)return `<button class="slot empty" data-slot="${j}" data-team="${i}"><div class="plus">＋</div><div class="hint">빈 슬롯</div></button>`;const c=charById(id)||{id,name:'삭제됨',elem:'',role:'',vigor:1};return `<button class="slot" data-remove="1" data-team="${i}" data-slot="${j}"><div class="portrait">${imgHtml(c)}</div><div class="name">${c.name}</div>${(c.alias&&c.alias[0])?`<div class="alias">(${c.alias[0]})</div>`:``}<div class="meta">${elemIcon(c.elem)} ${c.elem} · ${c.role}</div></button>`}
function place(i,j){if(!state.selected) return toast('캐릭터 먼저 선택');const c=charById(state.selected);if(!c) return; if(state.teams[i].includes(c.id)) return toast('같은 파티 중복 불가'); if(rem(c)<=0) return toast('피로도 없음'); state.teams[i][j]=c.id; if(rem(c)<=0) state.selected=null; render(); toast('배치 완료')}
function moveTeam(i,d){const n=i+d;if(n<0||n>=state.teams.length)return;[state.teams[i],state.teams[n]]=[state.teams[n],state.teams[i]];render()}
function sync(force=true){const map=new Map(state.chars.map(c=>[c.id,c]));let add=0,upd=0;DEFAULT_DB.forEach(d=>{const c=map.get(d.id);if(!c){state.chars.push(clone(d));add++}else if(force){Object.assign(c,d,{portrait:c.portrait||d.portrait,img:c.img});upd++}});if(force){render();toast(`DB 반영: 추가 ${add}, 갱신 ${upd}`)}}
function resetDb(){if(!confirm('캐릭터 DB를 기본값으로 초기화? 편성은 유지됨'))return;const valid=new Set(DEFAULT_DB.map(c=>c.id));state.chars=clone(DEFAULT_DB);state.teams=state.teams.map(t=>t.map(id=>valid.has(id)?id:null));state.selected=null;render();toast('DB 초기화 완료')}
function clearTeams(){if(!confirm('편성 전체 초기화?'))return;state.teams=state.teams.map(()=>[null,null,null]);state.selected=null;render();toast('초기화 완료')}
function exportJson(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='wuwa_matrix_v3_backup.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
function importJson(file){const r=new FileReader();r.onload=()=>{try{const s=JSON.parse(r.result);if(!s.chars||!s.teams)throw Error();state=s;render();toast('불러오기 완료')}catch(e){toast('JSON 형식 오류')}};r.readAsText(file)}
function openModal(id=null){state.editing=id;const c=id?charById(id):{id:'',name:'',en:'',elem:'응결',role:'Main DPS',vigor:1,weapon:'',portrait:''};$('mTitle').textContent=id?'캐릭터 수정':'캐릭터 추가';['Id','Name','En','Elem','Role','Vigor','Weapon','Portrait'].forEach(k=>{const el=$('m'+k); if(el) el.value=c[k.toLowerCase()]||''});$('mVigor').value=c.vigor||1;$('deleteChar').style.display=id?'block':'none';$('preview').innerHTML=imgHtml(c);$('modal').classList.add('on')}
function closeModal(){$('modal').classList.remove('on')};
function fileToDataUrl(file, cb){const fr=new FileReader();fr.onload=e=>{const im=new Image();im.onload=()=>{const size=160,cv=document.createElement('canvas'),ctx=cv.getContext('2d');cv.width=cv.height=size;const s=Math.min(im.width,im.height),x=(im.width-s)/2,y=(im.height-s)/2;ctx.drawImage(im,x,y,s,s,0,0,size,size);cb(cv.toDataURL('image/jpeg',.82))};im.src=e.target.result};fr.readAsDataURL(file)}
function saveChar(){const id=$('mId').value.trim()||('custom_'+Date.now());const obj={id,name:$('mName').value.trim(),en:$('mEn').value.trim(),elem:$('mElem').value,role:$('mRole').value,vigor:+$('mVigor').value,weapon:$('mWeapon').value.trim(),portrait:$('mPortrait').value.trim()};if(!obj.name)return toast('이름 입력');const finish=(portrait)=>{if(portrait)obj.portrait=portrait;const idx=state.chars.findIndex(c=>c.id===(state.editing||id));if(idx>=0)state.chars[idx]={...state.chars[idx],...obj,id:state.chars[idx].id};else state.chars.push(obj);closeModal();render();toast('저장 완료')};const f=$('mFile').files[0];if(f)fileToDataUrl(f,finish);else finish()}
function deleteChar(){const id=state.editing;if(!id||!confirm('삭제?'))return;state.chars=state.chars.filter(c=>c.id!==id);state.teams=state.teams.map(t=>t.map(x=>x===id?null:x));closeModal();render();toast('삭제 완료')}
function bind(){document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));$('goChars').onclick=()=>showTab('chars');$('goTeams').onclick=()=>showTab('teams');$('goManage').onclick=()=>showTab('manage');['q','elem','role'].forEach(id=>$(id).addEventListener('input',render));document.querySelectorAll('[data-elemquick]').forEach(b=>b.onclick=()=>{$('elem').value=b.dataset.elemquick;document.querySelectorAll('[data-elemquick]').forEach(x=>x.classList.toggle('on',x===b));render()});$('addTeam').onclick=()=>{state.teams.push([null,null,null]);render()};$('clearTeams').onclick=clearTeams;$('syncDb').onclick=()=>sync(true);$('resetDb').onclick=resetDb;$('exportBtn').onclick=exportJson;$('importFile').onchange=e=>e.target.files[0]&&importJson(e.target.files[0]);$('openAdd').onclick=()=>openModal();$('closeModal').onclick=closeModal;$('saveChar').onclick=saveChar;$('deleteChar').onclick=deleteChar;$('mPortrait').addEventListener('input',()=>{$('preview').innerHTML=$('mPortrait').value?`<img src="${$('mPortrait').value}">`:'사진'})}
load();bind();render();
</script>
</body></html>
